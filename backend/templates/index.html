<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FareFusion - Compare Rides</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='assets/logo.jpg') }}"
      type="image/x-icon"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body>
    <header>
      <div style="display: flex; align-items: center; gap: 15px">
        <a href="/" style="text-decoration: none; color: inherit"
          ><h1 id="logo">FareFusion</h1></a
        >
        <span
          id="current-location"
          class="location-badge"
          style="display: none"
        ></span>
      </div>

      <div class="header-actions">
        <a href="/history" class="back-btn">View History</a>
        <a href="/logout" class="logout-link" title="Logout"
          >{{ session.get('user_email') }}</a
        >
        <div class="theme-toggle" id="themeToggle">🌙</div>
      </div>
    </header>
    <form method="POST" action="/compare">
      <main>
        <p class="tagline">
          <span id="typing-text"></span>
        </p>
        <div class="autocomplete-container">
          <input
            type="text"
            id="source"
            name="source"
            placeholder="Enter source"
            autocomplete="off"
          />
          <ul id="source-list" class="autocomplete-list"></ul>
        </div>
        <div class="autocomplete-container">
          <input
            type="text"
            id="destination"
            name="destination"
            placeholder="Enter destination"
            autocomplete="off"
          />
          <ul id="destination-list" class="autocomplete-list"></ul>
        </div>
        <h2 class="section-title">
          Select the ride type you prefer for comparison
        </h2>
        <div class="ride-options">
          <div class="ride-card" data-ride="auto">
            <img
              src="{{ url_for('static', filename='assets/rickshaw.png') }}"
              height="50px"
              alt="Auto"
            />
            <p>Auto</p>
          </div>

          <div class="ride-card" data-ride="cab">
            <img
              src="{{ url_for('static', filename='assets/taxi.png') }}"
              height="50px"
              alt="Cab"
            />
            <p>Cab</p>
          </div>

          <div class="ride-card" data-ride="bike">
            <img
              src="{{ url_for('static', filename='assets/scooter.png') }}"
              height="50px"
              alt="Bike"
            />
            <p>Bike</p>
          </div>
        </div>
        <br /><br />
        <input type="hidden" name="ride_type" id="rideType" />
        <button value="submit" id="compare">Compare</button>
      </main>
    </form>
    <footer class="footer">© 2026 FareFusion. All Rights Reserved.</footer>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
  </body>
</html>
